<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="mN" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C01818"/><stop offset="100%" stop-color="#880808"/></linearGradient>
    <linearGradient id="mS" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1828C8"/><stop offset="100%" stop-color="#082080"/></linearGradient>
    <linearGradient id="bgMag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0C0820"/><stop offset="100%" stop-color="#060410"/></linearGradient>
    <filter id="glM"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shM"><feDropShadow dx="2" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgMag)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(168,85,247,.2)" stroke-width="3" rx="18"/>

  <!-- Judul -->
  <text x="400" y="50" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="34" font-weight="900" fill="#A855F7" filter="url(#glM)">🧲 GAYA MAGNET</text>
  <text x="400" y="78" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(168,85,247,.65)">Gaya tarik/tolak antar kutub magnet (Gaya TAK SENTUH)</text>

  <!-- Pembatas tengah -->
  <line x1="400" y1="96" x2="400" y2="460" stroke="rgba(255,255,255,.08)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- ===== KIRI: KUTUB SEJENIS MENOLAK ===== -->
  <text x="200" y="115" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" font-weight="800" fill="#FF7070">KUTUB SEJENIS → MENOLAK</text>

  <!-- Magnet kiri bawah — N dan N -->
  <!-- Magnet 1: S-N (N di kanan) -->
  <rect x="44" y="180" width="130" height="56" rx="10" fill="url(#mS)" filter="url(#shM)"/>
  <rect x="120" y="180" width="54" height="56" rx="0" fill="url(#mN)" style="border-radius:0 10px 10px 0"/>
  <text x="82" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">S</text>
  <text x="147" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">N</text>

  <!-- Magnet 2: N-S (N di kiri) -->
  <rect x="200" y="180" width="130" height="56" rx="10" fill="url(#mS)" filter="url(#shM)"/>
  <rect x="200" y="180" width="54" height="56" rx="10" fill="url(#mN)" style="border-radius:10px 0 0 10px"/>
  <text x="227" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">N</text>
  <text x="282" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">S</text>

  <!-- Panah menolak —  -->
  <line x1="172" y1="208" x2="200" y2="208" stroke="#FF5050" stroke-width="5" stroke-linecap="round"/>
  <polygon points="172,202 154,208 172,214" fill="#FF5050" filter="url(#glM)"/>
  <polygon points="200,202 218,208 200,214" fill="#FF5050" filter="url(#glM)"/>
  <text x="187" y="246" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#FF7070">↔ TOLAK</text>

  <!-- Garis medan magnet menolak (garis melengkung dari N ke N) -->
  <g fill="none" stroke="#FF5050" stroke-width="1.8" opacity="0.5" stroke-dasharray="5 4">
    <path d="M173 186 C173 152 200 146 200 186"/>
    <path d="M173 186 C173 130 200 118 200 186"/>
    <path d="M173 220 C173 252 200 258 200 220"/>
    <path d="M173 220 C173 270 200 280 200 220"/>
  </g>

  <!-- Contoh kejadian: menolak -->
  <rect x="44" y="270" width="290" height="56" rx="10" fill="rgba(255,80,80,.1)" stroke="rgba(255,80,80,.3)" stroke-width="1.5"/>
  <text x="189" y="295" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="700" fill="#FF9090">N — N  atau  S — S</text>
  <text x="189" y="316" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,144,144,.75)">Saling mendorong menjauh!</text>

  <!-- ===== KANAN: KUTUB BERBEDA MENARIK ===== -->
  <text x="600" y="115" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" font-weight="800" fill="#70FF70">KUTUB BERBEDA → MENARIK</text>

  <!-- Magnet 3: S-N (N kanan) -->
  <rect x="430" y="180" width="130" height="56" rx="10" fill="url(#mS)" filter="url(#shM)"/>
  <rect x="506" y="180" width="54" height="56" rx="0" fill="url(#mN)" style="border-radius:0 10px 10px 0"/>
  <text x="468" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">S</text>
  <text x="533" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">N</text>

  <!-- Magnet 4: S-N (S kiri) -->
  <rect x="590" y="180" width="130" height="56" rx="10" fill="url(#mS)" filter="url(#shM)"/>
  <rect x="590" y="180" width="54" height="56" rx="10" fill="url(#mN)" style="border-radius:10px 0 0 10px"/>
  <text x="617" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">N</text>
  <text x="672" y="213" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="26" font-weight="900" fill="#fff">S</text>

  <!-- Panah menarik -->
  <line x1="560" y1="208" x2="590" y2="208" stroke="#70FF70" stroke-width="5" stroke-linecap="round"/>
  <polygon points="590,202 608,208 590,214" fill="#70FF70" filter="url(#glM)"/>
  <polygon points="560,202 542,208 560,214" fill="#70FF70" filter="url(#glM)"/>
  <text x="575" y="246" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#70FF70">↔ TARIK</text>

  <!-- Garis medan menarik -->
  <g fill="none" stroke="#70FF70" stroke-width="2" opacity="0.55">
    <path d="M560 194 C560 168 590 168 590 194"/>
    <path d="M560 194 C560 144 590 144 590 194"/>
    <path d="M560 222 C560 246 590 246 590 222"/>
    <path d="M560 222 C560 268 590 268 590 222"/>
  </g>

  <rect x="430" y="270" width="290" height="56" rx="10" fill="rgba(112,255,112,.1)" stroke="rgba(112,255,112,.3)" stroke-width="1.5"/>
  <text x="575" y="295" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="700" fill="#90FF90">N — S  (kutub berbeda)</text>
  <text x="575" y="316" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(144,255,144,.75)">Saling menarik mendekat!</text>

  <!-- ===== BAGIAN BAWAH: Fakta & Penerapan ===== -->
  <rect x="44" y="352" width="714" height="96" rx="14" fill="rgba(168,85,247,.08)" stroke="rgba(168,85,247,.3)" stroke-width="2"/>
  <text x="400" y="382" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" font-weight="900" fill="#A855F7">🔍 FAKTA MAGNET</text>
  <text x="250" y="408" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,.8)">🌍 Bumi = Magnet Raksasa</text>
  <text x="250" y="428" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Kompas menunjuk Utara karena medan magnet bumi</text>
  <text x="590" y="408" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,.8)">💡 Penggunaan Magnet</text>
  <text x="590" y="428" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Speaker, dinamo, MRI, kereta maglev</text>
  <line x1="400" y1="365" x2="400" y2="440" stroke="rgba(168,85,247,.3)" stroke-width="1.5"/>

  <!-- Jenis gaya -->
  <rect x="44" y="464" width="714" height="110" rx="14" fill="rgba(255,214,0,.06)" stroke="rgba(255,214,0,.25)" stroke-width="2"/>
  <text x="400" y="494" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="17" font-weight="900" fill="#FFD600">⚡ GAYA MAGNET = GAYA TAK SENTUH</text>
  <text x="200" y="524" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" fill="rgba(255,255,255,.75)">✓ Gaya TAK SENTUH:</text>
  <text x="200" y="544" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Gravitasi · Magnet · Listrik</text>
  <text x="600" y="524" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" fill="rgba(255,255,255,.75)">✓ Gaya SENTUH:</text>
  <text x="600" y="544" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Gesek · Pegas · Otot · Normal</text>
  <line x1="400" y1="475" x2="400" y2="565" stroke="rgba(255,214,0,.2)" stroke-width="1.5"/>
  <text x="400" y="564" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,214,0,.5)">Gaya magnet dapat bekerja tanpa benda saling bersentuhan</text>
</svg>
