<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="casingG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3060A0"/><stop offset="50%" stop-color="#6090D8"/><stop offset="100%" stop-color="#3060A0"/></linearGradient>
    <linearGradient id="weightG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D07030"/><stop offset="100%" stop-color="#8A3800"/></linearGradient>
    <linearGradient id="bgPegas" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0C24"/><stop offset="100%" stop-color="#06080E"/></linearGradient>
    <filter id="glP"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shP"><feDropShadow dx="3" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgPegas)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(56,217,245,.2)" stroke-width="3" rx="18"/>

  <!-- Judul -->
  <text x="260" y="50" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="34" font-weight="900" fill="#38D9F5" filter="url(#glP)">🔧 GAYA PEGAS</text>
  <text x="260" y="80" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(56,217,245,.65)">Hukum Hooke: F = k × x</text>

  <!-- ===== NERACA PEGAS BESAR ===== -->
  <!-- Gantungan -->
  <rect x="186" y="100" width="88" height="24" rx="8" fill="#484848" filter="url(#shP)"/>
  <line x1="230" y1="124" x2="230" y2="148" stroke="#383838" stroke-width="6" stroke-linecap="round"/>

  <!-- Casing neraca -->
  <rect x="180" y="148" width="100" height="180" rx="18" fill="url(#casingG)" filter="url(#shP)"/>
  <!-- Lensa kaca transparan -->
  <rect x="188" y="158" width="26" height="160" rx="8" fill="rgba(255,255,255,.25)"/>
  <!-- Skala neraca -->
  <g stroke="#1A3060" stroke-width="1.5" fill="none">
    <line x1="206" y1="170" x2="240" y2="170"/><line x1="206" y1="192" x2="240" y2="192"/>
    <line x1="206" y1="214" x2="240" y2="214"/><line x1="206" y1="236" x2="240" y2="236"/>
    <line x1="206" y1="258" x2="240" y2="258"/><line x1="206" y1="280" x2="240" y2="280"/>
    <line x1="206" y1="302" x2="240" y2="302"/>
    <!-- sub-skala -->
    <line x1="210" y1="181" x2="232" y2="181" opacity=".6"/><line x1="210" y1="203" x2="232" y2="203" opacity=".6"/>
    <line x1="210" y1="225" x2="232" y2="225" opacity=".6"/><line x1="210" y1="247" x2="232" y2="247" opacity=".6"/>
    <line x1="210" y1="269" x2="232" y2="269" opacity=".6"/><line x1="210" y1="291" x2="232" y2="291" opacity=".6"/>
  </g>
  <!-- Label angka skala -->
  <g font-family="'Space Grotesk',monospace" font-size="14" font-weight="700" fill="#8AAAD8">
    <text x="252" y="174">0</text><text x="252" y="196">2</text><text x="252" y="218">4</text>
    <text x="252" y="240">6</text><text x="252" y="262">8</text><text x="252" y="284">10</text>
    <text x="252" y="306">N</text>
  </g>
  <!-- Jarum merah di angka 6 -->
  <line x1="196" y1="236" x2="214" y2="236" stroke="#FF4040" stroke-width="4" stroke-linecap="round" filter="url(#glP)"/>
  <circle cx="214" cy="236" r="5" fill="#FF4040" filter="url(#glP)"/>

  <!-- Pegas spiral di bawah casing -->
  <line x1="230" y1="328" x2="230" y2="348" stroke="#A0A0A0" stroke-width="5"/>
  <!-- Koil pegas zigzag besar -->
  <polyline points="230,348 200,360 260,376 200,392 260,408 200,424 260,440 200,456 230,468"
    fill="none" stroke="#C0C8D8" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shP)"/>
  <line x1="230" y1="468" x2="230" y2="490" stroke="#A0A0A0" stroke-width="5"/>
  <!-- Pengait -->
  <path d="M218 490 Q218 508 230 508 Q242 508 242 490" fill="none" stroke="#A0A0A0" stroke-width="5" stroke-linecap="round"/>

  <!-- Beban besar -->
  <rect x="180" y="508" width="100" height="64" rx="12" fill="url(#weightG)" filter="url(#shP)"/>
  <rect x="186" y="514" width="30" height="50" rx="6" fill="rgba(255,255,255,.18)"/>
  <text x="230" y="544" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#fff">600 g</text>
  <text x="230" y="562" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="13" fill="rgba(255,180,80,.7)">W = 6 N</text>

  <!-- Panah gaya ke bawah -->
  <line x1="298" y1="540" x2="298" y2="568" stroke="#FF6030" stroke-width="5" stroke-linecap="round"/>
  <polygon points="292,568 298,584 304,568" fill="#FF6030"/>
  <text x="314" y="562" font-family="'Nunito',sans-serif" font-size="15" fill="#FF6030" font-weight="700">W ↓</text>

  <!-- === PANEL RUMUS BESAR (kanan) === -->
  <rect x="360" y="100" width="400" height="470" rx="18" fill="rgba(56,217,245,.06)" stroke="rgba(56,217,245,.28)" stroke-width="2.5"/>

  <!-- Hukum Hooke -->
  <text x="560" y="145" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#38D9F5">📌 HUKUM HOOKE (1678)</text>
  <rect x="378" y="160" width="364" height="80" rx="14" fill="rgba(56,217,245,.12)" stroke="rgba(56,217,245,.4)" stroke-width="2"/>
  <text x="560" y="203" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="44" font-weight="700" fill="#B8FF3C">F = k · x</text>
  <text x="560" y="228" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(184,255,60,.7)">Gaya Pegas = Konstanta Pegas × Pertambahan Panjang</text>

  <!-- Keterangan variabel -->
  <g font-family="'Nunito',sans-serif" font-size="16" font-weight="700">
    <rect x="378" y="256" width="364" height="44" rx="10" fill="rgba(255,255,255,.04)"/>
    <text x="560" y="278" text-anchor="middle" fill="rgba(255,255,255,.8)">F (N) · k (N/m) · x = pertambahan panjang (m)</text>
  </g>

  <!-- Grafik F vs x (sederhana tapi besar dan jelas) -->
  <text x="560" y="324" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" font-weight="900" fill="#38D9F5">Grafik F – x (Linier)</text>
  <!-- Area grafik -->
  <rect x="390" y="338" width="340" height="180" rx="10" fill="rgba(0,0,0,.3)"/>
  <!-- Sumbu -->
  <line x1="420" y1="490" x2="700" y2="490" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
  <line x1="420" y1="348" x2="420" y2="490" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
  <!-- Label sumbu -->
  <text x="700" y="510" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,.7)">x (m)</text>
  <text x="396" y="348" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,.7)">F(N)</text>
  <!-- Garis grafik linier -->
  <line x1="420" y1="490" x2="680" y2="358" stroke="#B8FF3C" stroke-width="5" stroke-linecap="round" filter="url(#glP)"/>
  <!-- Titik data -->
  <circle cx="500" cy="446" r="7" fill="#38D9F5"/>
  <circle cx="580" cy="408" r="7" fill="#38D9F5"/>
  <circle cx="650" cy="374" r="7" fill="#38D9F5"/>
  <!-- Garis bantu titik -->
  <line x1="500" y1="446" x2="500" y2="490" stroke="rgba(56,217,245,.4)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="500" y1="446" x2="420" y2="446" stroke="rgba(56,217,245,.4)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Keterangan slope = k -->
  <text x="618" y="400" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#B8FF3C">slope = k</text>

  <!-- Contoh hitung -->
  <rect x="378" y="538" width="364" height="56" rx="12" fill="rgba(184,255,60,.1)" stroke="rgba(184,255,60,.35)" stroke-width="2"/>
  <text x="560" y="563" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700" fill="#B8FF3C">k = 100 N/m, x = 0,06 m → F = 6 N</text>
  <text x="560" y="583" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(184,255,60,.7)">Makin besar k → pegas makin kaku</text>
</svg>
