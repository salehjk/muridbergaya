<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="skinOt" cx="38%" cy="30%" r="70%"><stop offset="0%" stop-color="#FAD3AE"/><stop offset="100%" stop-color="#D8905C"/></radialGradient>
    <linearGradient id="shirtOt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4080D8"/><stop offset="100%" stop-color="#1848A8"/></linearGradient>
    <linearGradient id="boxOt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#80C040"/><stop offset="100%" stop-color="#406010"/></linearGradient>
    <linearGradient id="bgOt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A1018"/><stop offset="100%" stop-color="#050810"/></linearGradient>
    <filter id="glOt"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shOt"><feDropShadow dx="3" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgOt)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(255,140,66,.2)" stroke-width="3" rx="18"/>

  <!-- Judul -->
  <text x="400" y="50" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="34" font-weight="900" fill="#FF8C42" filter="url(#glOt)">💪 GAYA OTOT</text>
  <text x="400" y="78" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(255,140,66,.65)">Gaya yang dihasilkan kontraksi otot · Termasuk GAYA SENTUH</text>

  <!-- Lantai -->
  <rect x="40" y="468" width="540" height="22" rx="6" fill="#303838" filter="url(#shOt)"/>
  <line x1="40" y1="468" x2="580" y2="468" stroke="#404848" stroke-width="1.5"/>
  <!-- Garis keramik lantai -->
  <g stroke="#3A4444" stroke-width="1">
    <line x1="120" y1="468" x2="120" y2="490"/>
    <line x1="200" y1="468" x2="200" y2="490"/>
    <line x1="280" y1="468" x2="280" y2="490"/>
    <line x1="360" y1="468" x2="360" y2="490"/>
    <line x1="440" y1="468" x2="440" y2="490"/>
    <line x1="520" y1="468" x2="520" y2="490"/>
  </g>

  <!-- ===== ORANG MENDORONG ===== -->
  <!-- Kaki kiri (belakang) -->
  <line x1="166" y1="420" x2="136" y2="468" stroke="url(#shirtOt)" stroke-width="22" stroke-linecap="round"/>
  <!-- Kaki kanan (depan) -->
  <line x1="194" y1="420" x2="214" y2="468" stroke="url(#shirtOt)" stroke-width="22" stroke-linecap="round"/>
  <!-- Sepatu kiri -->
  <ellipse cx="128" cy="470" rx="20" ry="9" fill="#282828" transform="rotate(-14 128 470)"/>
  <!-- Sepatu kanan -->
  <ellipse cx="216" cy="470" rx="20" ry="9" fill="#282828" transform="rotate(8 216 470)"/>

  <!-- Badan (baju) -->
  <rect x="140" y="296" width="100" height="130" rx="22" fill="url(#shirtOt)" filter="url(#shOt)"/>
  <!-- Refleks baju -->
  <rect x="148" y="304" width="28" height="110" rx="10" fill="rgba(255,255,255,.18)"/>

  <!-- Kepala -->
  <circle cx="190" cy="264" r="36" fill="url(#skinOt)" filter="url(#shOt)"/>
  <!-- Rambut -->
  <path d="M154 250 Q190 224 226 250 Q218 234 204 228 Q190 222 176 228 Q162 234 154 250Z" fill="#2A1808"/>
  <!-- Telinga -->
  <ellipse cx="155" cy="266" rx="9" ry="12" fill="#C88050"/>
  <ellipse cx="225" cy="266" rx="9" ry="12" fill="#C88050"/>
  <!-- Wajah -->
  <circle cx="176" cy="260" r="5" fill="#3A2010"/>
  <circle cx="204" cy="260" r="5" fill="#3A2010"/>
  <!-- Senyum determinasi -->
  <path d="M174 278 Q190 290 206 278" fill="none" stroke="#C08050" stroke-width="3" stroke-linecap="round"/>
  <!-- Keringat -->
  <path d="M232 240 C238 234 240 244 234 248" fill="none" stroke="#88CCFF" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M244 252 C250 246 252 256 246 260" fill="none" stroke="#88CCFF" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Lengan kiri (belakang) -->
  <line x1="148" y1="318" x2="100" y2="358" stroke="url(#shirtOt)" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="96" cy="360" rx="16" ry="12" fill="url(#skinOt)" transform="rotate(-20 96 360)"/>

  <!-- Lengan kanan (mendorong ke depan) -->
  <line x1="240" y1="310" x2="316" y2="344" stroke="url(#shirtOt)" stroke-width="22" stroke-linecap="round"/>
  <!-- Tangan kanan kontak dengan kotak -->
  <ellipse cx="322" cy="348" rx="18" ry="13" fill="url(#skinOt)" filter="url(#shOt)" transform="rotate(-18 322 348)"/>

  <!-- ===== KOTAK DIDORONG ===== -->
  <rect x="330" y="330" width="170" height="138" rx="12" fill="url(#boxOt)" filter="url(#shOt)"/>
  <!-- Tekstur kotak -->
  <rect x="340" y="340" width="48" height="118" rx="6" fill="rgba(255,255,255,.18)"/>
  <line x1="400" y1="338" x2="400" y2="460" stroke="rgba(0,0,0,.2)" stroke-width="2"/>
  <line x1="330" y1="398" x2="500" y2="398" stroke="rgba(0,0,0,.2)" stroke-width="2"/>
  <!-- Label kotak -->
  <text x="415" y="388" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#fff">KOTAK</text>
  <text x="415" y="412" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,.7)">m = 20 kg</text>
  <text x="415" y="434" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="14" fill="rgba(255,255,255,.5)">W = 200 N</text>

  <!-- PANAH GAYA OTOT (F) ke kanan besar -->
  <line x1="500" y1="398" x2="580" y2="398" stroke="#FF8C42" stroke-width="9" stroke-linecap="round" filter="url(#glOt)"/>
  <polygon points="580,390 606,398 580,406" fill="#FF8C42" filter="url(#glOt)"/>
  <!-- Label F -->
  <rect x="588" y="374" width="148" height="50" rx="12" fill="rgba(255,140,66,.16)" stroke="#FF8C42" stroke-width="2"/>
  <text x="662" y="397" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="22" font-weight="700" fill="#FF8C42">F = 80 N</text>
  <text x="662" y="416" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,140,66,.7)">Gaya Otot</text>

  <!-- Gaya gesek berlawanan -->
  <line x1="330" y1="448" x2="240" y2="448" stroke="#FFD020" stroke-width="6" stroke-linecap="round" filter="url(#glOt)"/>
  <polygon points="240,442.5 218,448 240,453.5" fill="#FFD020" filter="url(#glOt)"/>
  <text x="278" y="436" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#FFD020">fg = 60 N</text>

  <!-- Panah arah gerak -->
  <line x1="500" y1="460" x2="580" y2="460" stroke="rgba(184,255,60,.5)" stroke-width="4" stroke-dasharray="8 5" stroke-linecap="round"/>
  <polygon points="580,455 594,460 580,465" fill="rgba(184,255,60,.5)"/>
  <text x="638" y="458" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(184,255,60,.6)" font-weight="700">→ Gerak</text>

  <!-- ===== PANEL KANAN: Info Gaya Otot ===== -->
  <rect x="626" y="100" width="154" height="340" rx="14" fill="rgba(255,140,66,.07)" stroke="rgba(255,140,66,.25)" stroke-width="2"/>
  <text x="703" y="130" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="900" fill="#FF8C42">GAYA OTOT</text>
  <text x="703" y="160" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.65)">Gaya SENTUH</text>
  <line x1="638" y1="172" x2="768" y2="172" stroke="rgba(255,140,66,.3)" stroke-width="1.5"/>
  <!-- Contoh -->
  <g font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.75)" text-anchor="middle">
    <text x="703" y="196">💪 Mendorong</text>
    <text x="703" y="220">🏋️ Mengangkat</text>
    <text x="703" y="244">🚴 Mengayuh</text>
    <text x="703" y="268">⚽ Menendang</text>
    <text x="703" y="292">🎾 Memukul</text>
    <text x="703" y="316">✂️ Memotong</text>
    <text x="703" y="340">📦 Menarik</text>
    <text x="703" y="364">🤸 Olahraga</text>
    <text x="703" y="388">✍️ Menulis</text>
  </g>

  <!-- Rumus di bawah -->
  <rect x="40" y="504" width="560" height="78" rx="14" fill="rgba(184,255,60,.07)" stroke="rgba(184,255,60,.28)" stroke-width="2"/>
  <text x="320" y="534" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="17" font-weight="900" fill="#B8FF3C">⚡ FR = F − fg = 80 − 60 = 20 N (ke kanan)</text>
  <text x="320" y="558" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(184,255,60,.65)">Benda bergerak karena Gaya Otot lebih besar dari Gaya Gesek</text>
  <text x="320" y="574" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.4)">Gaya Otot = Gaya SENTUH · Bekerja saat ada kontak langsung</text>
</svg>
