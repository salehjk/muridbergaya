<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 560" width="300" height="560">
  <defs>
    <linearGradient id="wallLB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#14082A"/><stop offset="100%" stop-color="#0C0418"/></linearGradient>
    <linearGradient id="deskLB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A2010"/><stop offset="100%" stop-color="#1C0C06"/></linearGradient>
    <linearGradient id="boardLB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#183A1E"/><stop offset="100%" stop-color="#0C2210"/></linearGradient>
    <filter id="glLB"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shLB"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <!-- Dinding lab -->
  <rect width="300" height="560" fill="url(#wallLB)"/>

  <!-- Garis tile dinding -->
  <g stroke="rgba(255,255,255,.04)" stroke-width="0.6">
    <line x1="0" y1="70" x2="300" y2="70"/><line x1="0" y1="140" x2="300" y2="140"/>
    <line x1="0" y1="210" x2="300" y2="210"/><line x1="0" y1="280" x2="300" y2="280"/>
    <line x1="0" y1="350" x2="300" y2="350"/>
    <line x1="60" y1="0" x2="60" y2="350"/><line x1="120" y1="0" x2="120" y2="350"/>
    <line x1="180" y1="0" x2="180" y2="350"/><line x1="240" y1="0" x2="240" y2="350"/>
  </g>

  <!-- Lampu LED kiri kanan -->
  <ellipse cx="24" cy="14" rx="8" ry="5" fill="#FFEE60" filter="url(#glLB)" opacity="0.9"/>
  <line x1="24" y1="0" x2="24" y2="10" stroke="#888840" stroke-width="2"/>
  <ellipse cx="276" cy="14" rx="8" ry="5" fill="#FFEE60" filter="url(#glLB)" opacity="0.9"/>
  <line x1="276" y1="0" x2="276" y2="10" stroke="#888840" stroke-width="2"/>
  <!-- Cahaya dari lampu -->
  <path d="M8 14 L42 14 L56 48 L-8 48Z" fill="rgba(255,238,96,.04)"/>
  <path d="M260 14 L292 14 L308 48 L244 48Z" fill="rgba(255,238,96,.04)"/>

  <!-- PAPAN TULIS HIJAU BESAR -->
  <rect x="14" y="28" width="272" height="158" rx="7" fill="url(#boardLB)" stroke="#2C5530" stroke-width="2.5" filter="url(#shLB)"/>
  <rect x="18" y="32" width="264" height="150" rx="5" fill="#1A4820" opacity="0.8"/>

  <!-- Tulisan di papan -->
  <text x="150" y="58" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="12" font-weight="900" fill="#70E890" opacity="0.9">⚡ MURID BERGAYA</text>
  <line x1="26" y1="66" x2="274" y2="66" stroke="rgba(100,220,128,.2)" stroke-width="0.8"/>

  <!-- Rumus-rumus di papan -->
  <g font-family="'Space Grotesk',monospace" font-size="10" fill="#A8FFC0" opacity="0.8">
    <text x="26" y="82">F = m × a</text>
    <text x="26" y="96">W = m × g</text>
    <text x="26" y="110">F = k × x</text>
    <text x="26" y="124">FR = F₁ + F₂</text>
    <text x="160" y="82">g ≈ 10 m/s²</text>
    <text x="160" y="96">ΣF = 0 → GLB</text>
    <text x="160" y="110">1 N = 1 kg·m/s²</text>
    <text x="160" y="124">fg ← arah gerak</text>
  </g>

  <!-- Gambar diagram sederhana di papan: panah gaya -->
  <line x1="30" y1="148" x2="70" y2="148" stroke="#50D870" stroke-width="2.5"/>
  <polygon points="70,145 80,148 70,151" fill="#50D870"/>
  <text x="55" y="142" font-family="monospace" font-size="8" fill="#70E890">F →</text>
  <line x1="100" y1="148" x2="60" y2="148" stroke="#FFD040" stroke-width="2"/>
  <polygon points="60,145 50,148 60,151" fill="#FFD040"/>
  <text x="78" y="142" font-family="monospace" font-size="8" fill="#FFD040">fg ←</text>

  <!-- Diagram Newton III di papan -->
  <line x1="170" y1="148" x2="210" y2="148" stroke="#FF7070" stroke-width="2"/>
  <polygon points="210,145 218,148 210,151" fill="#FF7070"/>
  <line x1="236" y1="148" x2="218" y2="148" stroke="#8080FF" stroke-width="2"/>
  <polygon points="218,145 210,148 218,151" fill="none"/>
  <line x1="236" y1="148" x2="260" y2="148" stroke="#8080FF" stroke-width="2"/>
  <polygon points="260,145 268,148 260,151" fill="none"/>
  <line x1="268" y1="148" x2="250" y2="148" stroke="#8080FF" stroke-width="2"/>
  <polygon points="250,145 242,148 250,151" fill="#8080FF"/>
  <text x="218" y="142" font-family="monospace" font-size="7" fill="#B0B0FF" text-anchor="middle">Aksi-Reaksi</text>

  <!-- Penghapus chalk -->
  <rect x="246" y="166" width="28" height="10" rx="3" fill="#C8C8B0" opacity="0.7" transform="rotate(-5 246 166)"/>
  <!-- Kapur -->
  <rect x="18" y="166" width="20" height="6" rx="2" fill="#F0F0E8" opacity="0.8"/>
  <rect x="44" y="168" width="16" height="5" rx="2" fill="#F0F0E8" opacity="0.6"/>

  <!-- MEJA LAB BESAR -->
  <rect x="8" y="390" width="284" height="18" rx="4" fill="url(#deskLB)" filter="url(#shLB)"/>
  <!-- Pinggiran meja -->
  <rect x="8" y="386" width="284" height="6" rx="3" fill="#6A4020" opacity="0.7"/>

  <!-- Kaki meja -->
  <rect x="18" y="408" width="12" height="152" rx="3" fill="#2A1208" opacity="0.9"/>
  <rect x="270" y="408" width="12" height="152" rx="3" fill="#2A1208" opacity="0.9"/>

  <!-- ALAT-ALAT DI ATAS MEJA -->
  <!-- Neraca pegas kecil -->
  <rect x="30" y="358" width="18" height="32" rx="5" fill="#3060A0" opacity="0.9"/>
  <rect x="32" y="360" width="5" height="28" rx="2" fill="rgba(255,255,255,.25)"/>
  <line x1="39" y1="390" x2="39" y2="400" stroke="#606060" stroke-width="2.5"/>
  <rect x="33" y="400" width="12" height="8" rx="3" fill="#D07030" opacity="0.9"/>
  <text x="55" y="368" font-family="sans-serif" font-size="7" fill="#6090D8" opacity="0.8">Neraca</text>
  <text x="55" y="378" font-family="sans-serif" font-size="7" fill="#6090D8" opacity="0.8">Pegas</text>

  <!-- Buku catatan -->
  <rect x="80" y="368" width="52" height="22" rx="3" fill="#F0EEE0" transform="rotate(-4 80 368)" opacity="0.85"/>
  <line x1="86" y1="374" x2="126" y2="372" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>
  <line x1="86" y1="380" x2="126" y2="378" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>
  <line x1="86" y1="385" x2="110" y2="383" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>

  <!-- Magnet batang -->
  <rect x="148" y="370" width="30" height="11" rx="4" fill="#C01818" opacity="0.9"/>
  <rect x="178" y="370" width="30" height="11" rx="4" fill="#1828C8" opacity="0.9"/>
  <text x="163" y="379" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="#fff">N</text>
  <text x="193" y="379" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="#fff">S</text>

  <!-- Tabung percobaan -->
  <rect x="226" y="355" width="12" height="28" rx="5" fill="rgba(100,200,255,.38)" stroke="#4080A0" stroke-width="1.2"/>
  <rect x="242" y="358" width="12" height="24" rx="5" fill="rgba(220,100,100,.38)" stroke="#A04040" stroke-width="1.2"/>

  <!-- Kelereng/bola -->
  <circle cx="272" cy="383" r="7" fill="#C04040" opacity="0.8"/>
  <circle cx="261" cy="385" r="5" fill="#4060C0" opacity="0.7"/>

  <!-- Area lantai lab di bawah meja -->
  <rect x="0" y="540" width="300" height="20" fill="#0A0408"/>

  <!-- Label Lab -->
  <text x="150" y="215" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="11" font-weight="800" fill="rgba(184,255,60,.2)">Laboratorium Gaya IPA</text>

  <!-- Poster di dinding -->
  <rect x="16" y="222" width="80" height="58" rx="5" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="56" y="240" text-anchor="middle" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,.35)">Hk Newton</text>
  <!-- Diagram kecil di poster -->
  <line x1="26" y1="252" x2="50" y2="252" stroke="#FF6030" stroke-width="1.5"/>
  <polygon points="50,249.5 56,252 50,254.5" fill="#FF6030"/>
  <text x="38" y="262" text-anchor="middle" font-family="sans-serif" font-size="6" fill="rgba(255,100,50,.6)">F=ma</text>
  <text x="56" y="272" font-family="sans-serif" font-size="6" fill="rgba(255,100,50,.5)">↑N</text>
  <text x="56" y="276" font-family="sans-serif" font-size="6" fill="rgba(255,100,50,.5)">↓W</text>

  <!-- Poster 2 -->
  <rect x="204" y="222" width="80" height="58" rx="5" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="244" y="240" text-anchor="middle" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,.35)">Jenis Gaya</text>
  <g font-family="sans-serif" font-size="6.5" fill="rgba(184,255,60,.45)" text-anchor="middle">
    <text x="244" y="254">• Gaya Gesek</text>
    <text x="244" y="264">• Gaya Gravitasi</text>
    <text x="244" y="274">• Gaya Pegas</text>
  </g>
</svg>
