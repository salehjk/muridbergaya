<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bkN23" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5060C8"/><stop offset="100%" stop-color="#2030A0"/></linearGradient>
    <linearGradient id="bkN23b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8040D0"/><stop offset="100%" stop-color="#4010A0"/></linearGradient>
    <linearGradient id="bgN23" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0C081C"/><stop offset="100%" stop-color="#060410"/></linearGradient>
    <filter id="glN23"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shN23"><feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgN23)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(168,85,247,.2)" stroke-width="3" rx="18"/>

  <!-- ===== NEWTON II (atas) ===== -->
  <rect x="20" y="12" width="760" height="272" rx="14" fill="rgba(80,96,200,.07)" stroke="rgba(80,96,200,.25)" stroke-width="2"/>

  <text x="400" y="46" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="30" font-weight="900" fill="#7090FF" filter="url(#glN23)">📐 HUKUM NEWTON II</text>
  <rect x="160" y="54" width="480" height="50" rx="12" fill="rgba(80,96,200,.15)" stroke="rgba(80,96,200,.4)" stroke-width="2"/>
  <text x="400" y="86" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="34" font-weight="700" fill="#B8FF3C">F = m × a</text>

  <!-- Perbandingan dua benda -->
  <!-- Benda 1: massa kecil -->
  <text x="175" y="128" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#7090FF">Massa KECIL → Percepatan BESAR</text>
  <rect x="60" y="140" width="80" height="50" rx="8" fill="url(#bkN23)" filter="url(#shN23)"/>
  <text x="100" y="172" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" font-weight="900" fill="#fff">2 kg</text>
  <!-- Gaya -->
  <line x1="140" y1="165" x2="185" y2="165" stroke="#FF6030" stroke-width="5" stroke-linecap="round"/>
  <polygon points="185,159.5 200,165 185,170.5" fill="#FF6030"/>
  <text x="164" y="155" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#FF6030">F=20N</text>
  <!-- Percepatan panjang -->
  <line x1="200" y1="180" x2="300" y2="180" stroke="#B8FF3C" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 4" filter="url(#glN23)"/>
  <polygon points="300,175 318,180 300,185" fill="#B8FF3C" filter="url(#glN23)"/>
  <text x="254" y="200" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="700" fill="#B8FF3C">a = 10 m/s²</text>

  <!-- Divider vertikal -->
  <line x1="400" y1="128" x2="400" y2="268" stroke="rgba(255,255,255,.1)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Benda 2: massa besar -->
  <text x="590" y="128" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#7090FF">Massa BESAR → Percepatan KECIL</text>
  <rect x="440" y="130" width="130" height="70" rx="10" fill="url(#bkN23b)" filter="url(#shN23)"/>
  <text x="505" y="172" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#fff">10 kg</text>
  <!-- Gaya sama -->
  <line x1="570" y1="165" x2="615" y2="165" stroke="#FF6030" stroke-width="5" stroke-linecap="round"/>
  <polygon points="615,159.5 630,165 615,170.5" fill="#FF6030"/>
  <text x="590" y="155" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#FF6030">F=20N</text>
  <!-- Percepatan pendek -->
  <line x1="630" y1="180" x2="670" y2="180" stroke="#B8FF3C" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 4" filter="url(#glN23)"/>
  <polygon points="670,175.5 682,180 670,184.5" fill="#B8FF3C" filter="url(#glN23)"/>
  <text x="655" y="200" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="700" fill="#B8FF3C">a = 2 m/s²</text>

  <!-- Rumus bawah Newton II -->
  <rect x="60" y="220" width="680" height="50" rx="12" fill="rgba(184,255,60,.08)" stroke="rgba(184,255,60,.3)" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="18" font-weight="700" fill="#B8FF3C">a = F/m  →  Percepatan berbanding lurus F, berbanding terbalik m</text>
  <text x="400" y="262" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(184,255,60,.65)">F = 20N,  m = 2kg → a = 10m/s²  |  F = 20N,  m = 10kg → a = 2m/s²</text>

  <!-- ===== NEWTON III (bawah) ===== -->
  <rect x="20" y="296" width="760" height="288" rx="14" fill="rgba(168,85,247,.07)" stroke="rgba(168,85,247,.25)" stroke-width="2"/>

  <text x="400" y="330" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="30" font-weight="900" fill="#A855F7" filter="url(#glN23)">🤜 HUKUM NEWTON III</text>
  <rect x="140" y="338" width="520" height="50" rx="12" fill="rgba(168,85,247,.15)" stroke="rgba(168,85,247,.4)" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="26" font-weight="700" fill="#fff">F aksi = F reaksi (sama besar, BERLAWANAN arah)</text>

  <!-- Ilustrasi dua orang dorong -->
  <!-- Orang kiri -->
  <circle cx="148" cy="430" r="20" fill="#F0C890"/>
  <line x1="148" y1="450" x2="148" y2="490" stroke="#4060A8" stroke-width="6" stroke-linecap="round"/>
  <line x1="148" y1="462" x2="120" y2="480" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="462" x2="192" y2="458" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="490" x2="130" y2="516" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="490" x2="166" y2="516" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <text x="148" y="538" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="#A0B8D8" font-weight="700">Orang A</text>

  <!-- Orang kanan -->
  <circle cx="412" cy="430" r="20" fill="#F0C890"/>
  <line x1="412" y1="450" x2="412" y2="490" stroke="#4060A8" stroke-width="6" stroke-linecap="round"/>
  <line x1="412" y1="462" x2="440" y2="480" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="412" y1="462" x2="368" y2="458" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="412" y1="490" x2="430" y2="516" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <line x1="412" y1="490" x2="394" y2="516" stroke="#4060A8" stroke-width="5" stroke-linecap="round"/>
  <text x="412" y="538" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="#A0B8D8" font-weight="700">Orang B</text>

  <!-- Panah aksi (ke kanan dari A) -->
  <line x1="270" y1="460" x2="340" y2="460" stroke="#FF6030" stroke-width="7" stroke-linecap="round" filter="url(#glN23)"/>
  <polygon points="340,454 358,460 340,466" fill="#FF6030" filter="url(#glN23)"/>
  <text x="304" y="448" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FF6030">AKSI →</text>

  <!-- Panah reaksi (ke kiri dari B) -->
  <line x1="290" y1="476" x2="220" y2="476" stroke="#A855F7" stroke-width="7" stroke-linecap="round" filter="url(#glN23)"/>
  <polygon points="220,470 202,476 220,482" fill="#A855F7" filter="url(#glN23)"/>
  <text x="256" y="498" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#A855F7">← REAKSI</text>

  <!-- Contoh roket -->
  <!-- Roket sederhana -->
  <polygon points="600,400 620,440 640,440 660,400 630,384" fill="#D0D8F0" filter="url(#shN23)"/>
  <rect x="614" y="440" width="32" height="24" rx="4" fill="#A0A8C8"/>
  <ellipse cx="630" cy="440" rx="16" ry="8" fill="#FF8030"/>
  <!-- Lidah api -->
  <polygon points="616,464 622,500 630,476 638,500 644,464" fill="#FF4000" opacity="0.9" filter="url(#glN23)"/>
  <polygon points="620,464 626,488 630,472 634,488 640,464" fill="#FFD000" opacity="0.8"/>
  <!-- Gas ke bawah — panah aksi -->
  <text x="630" y="514" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" font-weight="700" fill="#FF7030">Gas ↓ (aksi)</text>
  <!-- Roket ke atas — panah reaksi -->
  <line x1="630" y1="384" x2="630" y2="346" stroke="#A855F7" stroke-width="6" stroke-linecap="round" filter="url(#glN23)"/>
  <polygon points="624,346 630,328 636,346" fill="#A855F7" filter="url(#glN23)"/>
  <text x="700" y="358" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" font-weight="700" fill="#A855F7">Roket ↑ (reaksi)</text>
  <!-- Label roket -->
  <text x="630" y="562" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" font-weight="700" fill="#A0A8C8">Roket 🚀</text>

  <!-- Divider vertikal panel bawah -->
  <line x1="480" y1="310" x2="480" y2="570" stroke="rgba(255,255,255,.08)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Fakta Newton III -->
  <rect x="510" y="426" width="250" height="120" rx="12" fill="rgba(168,85,247,.1)" stroke="rgba(168,85,247,.3)" stroke-width="1.5"/>
  <text x="635" y="454" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" font-weight="900" fill="#C880FF">Contoh lain:</text>
  <text x="635" y="476" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.75)">🏊 Perenang mendorong air ←</text>
  <text x="635" y="496" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Air mendorong perenang → maju</text>
  <text x="635" y="518" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.75)">⛵ Dayung mendorong air ←</text>
  <text x="635" y="538" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Air mendorong perahu → maju</text>
</svg>
