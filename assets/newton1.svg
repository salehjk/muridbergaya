<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="carN1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4080D8"/><stop offset="100%" stop-color="#1840A0"/></linearGradient>
    <linearGradient id="roadN1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#484848"/><stop offset="100%" stop-color="#282828"/></linearGradient>
    <linearGradient id="bgN1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10081C"/><stop offset="100%" stop-color="#08040E"/></linearGradient>
    <filter id="glN1"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shN1"><feDropShadow dx="2" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgN1)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(184,255,60,.18)" stroke-width="3" rx="18"/>

  <!-- Judul -->
  <text x="400" y="48" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="32" font-weight="900" fill="#B8FF3C" filter="url(#glN1)">📐 HUKUM NEWTON I</text>
  <!-- Rumus besar -->
  <rect x="140" y="60" width="520" height="54" rx="14" fill="rgba(184,255,60,.1)" stroke="rgba(184,255,60,.35)" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="28" font-weight="700" fill="#B8FF3C">Σ F = 0  →  Benda diam ATAU bergerak lurus beraturan</text>

  <!-- Pembatas tengah vertikal -->
  <line x1="400" y1="125" x2="400" y2="430" stroke="rgba(255,255,255,.1)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- ===== PANEL KIRI: BENDA DIAM ===== -->
  <rect x="20" y="126" width="365" height="290" rx="14" fill="rgba(255,100,50,.06)" stroke="rgba(255,100,50,.22)" stroke-width="2"/>
  <text x="202" y="158" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="19" font-weight="900" fill="#FF8050">📦 BENDA DIAM (Σ F = 0)</text>

  <!-- Balok diam -->
  <!-- Permukaan -->
  <rect x="50" y="316" width="305" height="18" rx="5" fill="#484848"/>
  <!-- Blok -->
  <rect x="120" y="242" width="165" height="74" rx="10" fill="url(#carN1)" filter="url(#shN1)"/>
  <rect x="128" y="250" width="50" height="58" rx="6" fill="rgba(255,255,255,.2)"/>
  <text x="202" y="285" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#fff">BALOK</text>
  <text x="202" y="305" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="14" fill="rgba(255,255,255,.65)">m = 10 kg</text>

  <!-- F1 ke kanan -->
  <line x1="285" y1="279" x2="328" y2="279" stroke="#FF6030" stroke-width="5" stroke-linecap="round" filter="url(#glN1)"/>
  <polygon points="328,273.5 344,279 328,284.5" fill="#FF6030"/>
  <text x="340" y="268" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FF6030">F₁=50N</text>

  <!-- F2 ke kiri -->
  <line x1="120" y1="279" x2="77" y2="279" stroke="#FF6030" stroke-width="5" stroke-linecap="round" filter="url(#glN1)"/>
  <polygon points="77,273.5 61,279 77,284.5" fill="#FF6030"/>
  <text x="30" y="268" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FF6030">F₂=50N</text>

  <!-- N atas -->
  <line x1="202" y1="242" x2="202" y2="205" stroke="#00D898" stroke-width="5" stroke-linecap="round"/>
  <polygon points="196,205 202,190 208,205" fill="#00D898"/>
  <text x="214" y="200" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#00D898">N</text>
  <!-- W bawah -->
  <line x1="202" y1="316" x2="202" y2="340" stroke="#FF6030" stroke-width="4" stroke-linecap="round"/>
  <polygon points="196,340 202,354 208,340" fill="#FF6030"/>
  <text x="214" y="352" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#FF6030">W</text>

  <!-- Rumus ΣF = 0 -->
  <rect x="44" y="362" width="277" height="40" rx="10" fill="rgba(184,255,60,.1)" stroke="rgba(184,255,60,.3)" stroke-width="1.5"/>
  <text x="182" y="387" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="18" font-weight="700" fill="#B8FF3C">Σ F = 50 − 50 = 0  ✓ DIAM</text>

  <!-- ===== PANEL KANAN: BENDA BERGERAK ===== -->
  <rect x="415" y="126" width="365" height="290" rx="14" fill="rgba(56,217,245,.06)" stroke="rgba(56,217,245,.22)" stroke-width="2"/>
  <text x="597" y="158" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="19" font-weight="900" fill="#38D9F5">🚗 BERGERAK (GLB)</text>

  <!-- Jalan -->
  <rect x="432" y="316" width="330" height="18" rx="5" fill="url(#roadN1)"/>
  <line x1="450" y1="325" x2="500" y2="325" stroke="#FFD600" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="520" y1="325" x2="570" y2="325" stroke="#FFD600" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="590" y1="325" x2="640" y2="325" stroke="#FFD600" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="660" y1="325" x2="710" y2="325" stroke="#FFD600" stroke-width="3" stroke-dasharray="10 8"/>

  <!-- Mobil -->
  <!-- Badan -->
  <rect x="480" y="266" width="190" height="50" rx="14" fill="url(#carN1)" filter="url(#shN1)"/>
  <!-- Kaca depan -->
  <path d="M618 266 L640 248 L664 248 L670 266Z" fill="#90C8F0" opacity="0.75"/>
  <!-- Kaca belakang -->
  <path d="M490 266 L506 248 L530 248 L538 266Z" fill="#90C8F0" opacity="0.6"/>
  <!-- Lampu -->
  <ellipse cx="672" cy="284" rx="9" ry="7" fill="#FFEE80" filter="url(#glN1)"/>
  <!-- Roda -->
  <circle cx="520" cy="318" r="22" fill="#2A2A2A" filter="url(#shN1)"/>
  <circle cx="520" cy="318" r="12" fill="#606060"/>
  <circle cx="640" cy="318" r="22" fill="#2A2A2A" filter="url(#shN1)"/>
  <circle cx="640" cy="318" r="12" fill="#606060"/>

  <!-- Panah kecepatan tetap v -->
  <line x1="672" y1="284" x2="730" y2="284" stroke="#38D9F5" stroke-width="6" stroke-linecap="round" filter="url(#glN1)"/>
  <polygon points="730,278 748,284 730,290" fill="#38D9F5" filter="url(#glN1)"/>
  <text x="745" y="278" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#38D9F5">v</text>
  <text x="745" y="298" font-family="'Nunito',sans-serif" font-size="12" fill="#38D9F5" opacity="0.7">tetap</text>

  <!-- Jejak kecepatan -->
  <g stroke="#38D9F5" stroke-width="1.5" opacity="0.25">
    <line x1="432" y1="284" x2="480" y2="284"/>
  </g>

  <!-- ΣF = 0 pada mobil juga -->
  <rect x="432" y="362" width="330" height="40" rx="10" fill="rgba(56,217,245,.1)" stroke="rgba(56,217,245,.3)" stroke-width="1.5"/>
  <text x="597" y="387" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="18" font-weight="700" fill="#38D9F5">Σ F = 0  →  v tetap (GLB)  ✓</text>

  <!-- ===== KELEMBAMAN / INERSIA ===== -->
  <rect x="20" y="432" width="760" height="80" rx="14" fill="rgba(168,85,247,.08)" stroke="rgba(168,85,247,.28)" stroke-width="2"/>
  <text x="400" y="460" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#A855F7">🔄 KELEMBAMAN (INERSIA)</text>
  <text x="400" y="486" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(255,255,255,.8)">Benda cenderung mempertahankan keadaannya (diam atau GLB) jika tidak ada gaya luar yang bekerja</text>
  <text x="400" y="504" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(255,255,255,.5)">Makin besar massa → makin besar kelembaman</text>

  <!-- Contoh kehidupan -->
  <rect x="20" y="524" width="370" height="58" rx="12" fill="rgba(255,200,50,.08)" stroke="rgba(255,200,50,.25)" stroke-width="1.5"/>
  <text x="205" y="550" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#FFD070">🚌 Bus berhenti mendadak</text>
  <text x="205" y="570" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,200,80,.7)">Penumpang terdorong ke depan (inersia)</text>
  <rect x="410" y="524" width="370" height="58" rx="12" fill="rgba(255,200,50,.08)" stroke="rgba(255,200,50,.25)" stroke-width="1.5"/>
  <text x="595" y="550" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="15" font-weight="800" fill="#FFD070">🏃 Olahraga pelari</text>
  <text x="595" y="570" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,200,80,.7)">Tetap bergerak meski kaki berhenti melangkah</text>
</svg>
