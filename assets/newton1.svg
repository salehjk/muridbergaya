<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <defs>
    <linearGradient id="carG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5090E0"/><stop offset="100%" stop-color="#2060C0"/></linearGradient>
    <filter id="n1sh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- judul -->
  <text x="130" y="18" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="13" font-weight="700" fill="#90D0FF">Hukum Newton I</text>
  <text x="130" y="33" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#C0D8F0" opacity="0.9">Σ F = 0 → benda diam atau gerak lurus beraturan</text>

  <!-- ===== PANEL KIRI: benda DIAM ===== -->
  <rect x="14" y="44" width="108" height="90" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="68" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#FFD080">BENDA DIAM</text>

  <!-- permukaan -->
  <rect x="22" y="108" width="92" height="8" rx="3" fill="#5A4010" opacity="0.8"/>

  <!-- balok diam -->
  <rect x="44" y="84" width="48" height="24" rx="5" fill="url(#carG)" filter="url(#n1sh)"/>
  <rect x="48" y="87" width="14" height="17" rx="2" fill="#90C0FF" opacity="0.3"/>
  <!-- panah ke kanan = F1 -->
  <line x1="92" y1="96" x2="104" y2="96" stroke="#E85D24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="104,91.5 114,96 104,100.5" fill="#E85D24"/>
  <!-- panah ke kiri = F2 sama besar -->
  <line x1="44" y1="96" x2="32" y2="96" stroke="#E85D24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,91.5 22,96 32,100.5" fill="#E85D24"/>
  <text x="68" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E85D24">F₁ = F₂</text>
  <!-- label: ΣF = 0 -->
  <rect x="28" y="120" width="80" height="18" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="68" y="132" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#90D0FF">Σ F = 0 → diam</text>

  <!-- ===== PANEL KANAN: benda BERGERAK ===== -->
  <rect x="138" y="44" width="108" height="90" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="192" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#90FFD0">BENDA BERGERAK</text>

  <!-- rel/jalur -->
  <rect x="146" y="108" width="92" height="8" rx="3" fill="#5A4010" opacity="0.8"/>

  <!-- mobil bergerak -->
  <!-- badan mobil -->
  <rect x="156" y="88" width="68" height="20" rx="8" fill="url(#carG)" filter="url(#n1sh)"/>
  <!-- kaca -->
  <path d="M170 88 L180 78 L202 78 L212 88Z" fill="#80B0E8" opacity="0.7"/>
  <!-- roda -->
  <circle cx="172" cy="109" r="8" fill="#303030" filter="url(#n1sh)"/>
  <circle cx="172" cy="109" r="4" fill="#808080"/>
  <circle cx="208" cy="109" r="8" fill="#303030" filter="url(#n1sh)"/>
  <circle cx="208" cy="109" r="4" fill="#808080"/>
  <!-- panah kecepatan -->
  <line x1="222" y1="94" x2="240" y2="94" stroke="#90FF90" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="240,90 252,94 240,98" fill="#90FF90"/>
  <text x="241" y="88" font-family="sans-serif" font-size="9" fill="#90FF90">v</text>
  <!-- jejak gerak -->
  <g stroke="#90FF90" stroke-width="1" opacity="0.4" stroke-dasharray="3 3">
    <line x1="146" y1="94" x2="155" y2="94"/>
  </g>
  <rect x="148" y="120" width="86" height="18" rx="5" fill="rgba(0,0,0,0.3)"/>
  <text x="191" y="132" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="700" fill="#90FFD0">Σ F = 0 → GLB</text>

  <!-- prinsip kelembaman -->
  <rect x="14" y="150" width="232" height="74" rx="10" fill="rgba(0,0,0,0.22)"/>
  <text x="130" y="167" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#FFD080">Kelembaman (Inersia)</text>
  <text x="130" y="183" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#D8E8FF">Benda cenderung mempertahankan keadaannya.</text>
  <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#D8E8FF">Contoh: penumpang tersentak saat bus tiba-tiba</text>
  <text x="130" y="209" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#D8E8FF">berhenti atau tiba-tiba melaju.</text>
</svg>
