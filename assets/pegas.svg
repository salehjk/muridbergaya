<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <defs>
    <linearGradient id="springG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9B9B9B"/><stop offset="50%" stop-color="#E8E8E8"/><stop offset="100%" stop-color="#9B9B9B"/></linearGradient>
    <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6090D8"/><stop offset="50%" stop-color="#A8C8F8"/><stop offset="100%" stop-color="#6090D8"/></linearGradient>
    <filter id="pegSh"><feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <!-- gantungan atas -->
  <rect x="104" y="10" width="52" height="14" rx="5" fill="#606060" filter="url(#pegSh)"/>
  <line x1="130" y1="24" x2="130" y2="38" stroke="#505050" stroke-width="3"/>
  <!-- bodi neraca pegas (casing) -->
  <rect x="112" y="38" width="36" height="90" rx="10" fill="url(#bodyG)" filter="url(#pegSh)"/>
  <rect x="118" y="44" width="6" height="76" rx="3" fill="white" opacity="0.4"/>
  <!-- skala neraca -->
  <g stroke="#1A3060" stroke-width="1" fill="#1A3060" font-family="monospace" font-size="8">
    <line x1="126" y1="50" x2="140" y2="50"/><text x="142" y="53">0</text>
    <line x1="126" y1="62" x2="140" y2="62"/><text x="142" y="65">2</text>
    <line x1="126" y1="74" x2="140" y2="74"/><text x="142" y="77">4</text>
    <line x1="126" y1="86" x2="140" y2="86"/><text x="142" y="89">6</text>
    <line x1="126" y1="98" x2="140" y2="98"/><text x="142" y="101">8</text>
    <line x1="126" y1="110" x2="140" y2="110"/><text x="142" y="113">10</text>
    <!-- sub-skala -->
    <line x1="130" y1="56" x2="138" y2="56" opacity="0.5"/>
    <line x1="130" y1="68" x2="138" y2="68" opacity="0.5"/>
    <line x1="130" y1="80" x2="138" y2="80" opacity="0.5"/>
    <line x1="130" y1="92" x2="138" y2="92" opacity="0.5"/>
    <line x1="130" y1="104" x2="138" y2="104" opacity="0.5"/>
  </g>
  <!-- jarum penunjuk -->
  <line x1="126" y1="86" x2="116" y2="86" stroke="#E85D24" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="116" cy="86" r="3" fill="#E85D24"/>
  <!-- pegas spiral di bawah casing -->
  <line x1="130" y1="128" x2="130" y2="138" stroke="#606060" stroke-width="2.5"/>
  <!-- pegas zigzag -->
  <polyline points="130,138 120,144 140,150 120,156 140,162 120,168 130,174" fill="none" stroke="url(#springG)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="130" y1="174" x2="130" y2="184" stroke="#606060" stroke-width="2.5"/>
  <!-- pengait bawah -->
  <path d="M126 184 L126 190 Q126 195 130 195 Q134 195 134 190 L134 184" fill="none" stroke="#606060" stroke-width="2.5" stroke-linecap="round"/>
  <!-- beban -->
  <rect x="106" y="195" width="48" height="32" rx="7" fill="#CC7020" filter="url(#pegSh)"/>
  <rect x="110" y="199" width="14" height="22" rx="3" fill="#F0A050" opacity="0.45"/>
  <text x="130" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#fff">500 g</text>
  <!-- panah berat bawah -->
  <line x1="130" y1="227" x2="130" y2="236" stroke="#E85D24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="126,236 130,243 134,236" fill="#E85D24"/>
  <!-- label unit N -->
  <text x="155" y="113" font-family="monospace" font-size="8" fill="#405080">N</text>
  <!-- label kiri: F=kx -->
  <rect x="14" y="138" width="82" height="48" rx="8" fill="rgba(0,10,30,0.3)"/>
  <text x="55" y="157" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#A8D0FF">Hukum Hooke:</text>
  <text x="55" y="172" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#FFD080">F = k · x</text>
  <text x="55" y="183" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#A8C0E0">k = konstanta pegas</text>
  <!-- label bawah -->
  <text x="130" y="14" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="700" fill="#A8C8F8">Gaya Pegas</text>
</svg>
