<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 560" width="300" height="560">
  <defs>
    <linearGradient id="deskG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2A1E0C"/><stop offset="100%" stop-color="#1A1006"/></linearGradient>
    <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A1E2A"/><stop offset="100%" stop-color="#101420"/></linearGradient>
    <linearGradient id="bGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A3A20"/><stop offset="100%" stop-color="#0E2212"/></linearGradient>
    <filter id="ls"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.55"/></filter>
  </defs>

  <!-- latar ruangan lab -->
  <rect width="300" height="560" fill="url(#wallG)"/>

  <!-- garis keramik dinding -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.7">
    <line x1="0" y1="80" x2="300" y2="80"/><line x1="0" y1="160" x2="300" y2="160"/>
    <line x1="0" y1="240" x2="300" y2="240"/><line x1="0" y1="320" x2="300" y2="320"/>
    <line x1="60" y1="0" x2="60" y2="560"/><line x1="120" y1="0" x2="120" y2="560"/>
    <line x1="180" y1="0" x2="180" y2="560"/><line x1="240" y1="0" x2="240" y2="560"/>
  </g>

  <!-- papan tulis hijau di belakang -->
  <rect x="30" y="20" width="240" height="130" rx="8" fill="url(#bGreen)" stroke="#2C4A30" stroke-width="2" filter="url(#ls)"/>
  <rect x="36" y="26" width="228" height="118" rx="5" fill="#1E4228" opacity="0.7"/>

  <!-- tulisan di papan tulis -->
  <text x="150" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#A8FFB0" opacity="0.9">Rumus-Rumus Gaya</text>
  <g font-family="monospace" font-size="10" fill="#D0FFC0" opacity="0.75">
    <text x="54" y="76">F = m × a</text>
    <text x="54" y="91">W = m × g</text>
    <text x="54" y="106">F = k × x</text>
    <text x="170" y="76">g ≈ 10 m/s²</text>
    <text x="170" y="91">ΣF = 0 → GLB</text>
    <text x="170" y="106">N = F (Newton)</text>
  </g>
  <!-- coretan/garis chalk -->
  <line x1="50" y1="118" x2="90" y2="118" stroke="#A8FFA0" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="122" x2="180" y2="122" stroke="#A8FFA0" stroke-width="0.7" opacity="0.3"/>

  <!-- meja laboratorium (dari samping) -->
  <rect x="10" y="380" width="280" height="16" rx="4" fill="#5C3A14" filter="url(#ls)"/>
  <!-- kaki meja -->
  <rect x="20" y="396" width="14" height="140" rx="4" fill="#4A2E0C"/>
  <rect x="266" y="396" width="14" height="140" rx="4" fill="#4A2E0C"/>

  <!-- peralatan di atas meja -->
  <!-- neraca pegas -->
  <rect x="36" y="336" width="22" height="44" rx="5" fill="#5080C0" opacity="0.85"/>
  <rect x="40" y="340" width="5" height="36" rx="2" fill="white" opacity="0.3"/>
  <line x1="47" y1="380" x2="47" y2="390" stroke="#808080" stroke-width="2"/>
  <!-- beban kecil -->
  <rect x="40" y="390" width="14" height="10" rx="3" fill="#C07020" opacity="0.9"/>

  <!-- tabung percobaan -->
  <rect x="80" y="350" width="14" height="30" rx="5" fill="rgba(100,200,255,0.4)" stroke="#4080A0" stroke-width="1"/>
  <rect x="94" y="352" width="14" height="28" rx="5" fill="rgba(200,100,100,0.4)" stroke="#A04040" stroke-width="1"/>

  <!-- buku catatan -->
  <rect x="120" y="358" width="52" height="22" rx="3" fill="#F0EEE0" transform="rotate(-3 120 358)" opacity="0.85"/>
  <line x1="126" y1="364" x2="166" y2="362" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>
  <line x1="126" y1="370" x2="166" y2="368" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>
  <line x1="126" y1="376" x2="150" y2="374" stroke="#C0B890" stroke-width="0.8" opacity="0.6"/>

  <!-- magnet batang -->
  <rect x="192" y="362" width="28" height="10" rx="4" fill="#D82020" opacity="0.9"/>
  <rect x="220" y="362" width="28" height="10" rx="4" fill="#2050C0" opacity="0.9"/>
  <text x="206" y="370.5" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#fff">N</text>
  <text x="234" y="370.5" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#fff">S</text>

  <!-- lampu LED pojok atas (ambient) -->
  <circle cx="28" cy="16" r="6" fill="rgba(255,255,180,0.85)" filter="url(#ls)"/>
  <circle cx="272" cy="16" r="6" fill="rgba(255,255,180,0.85)" filter="url(#ls)"/>
  <line x1="28" y1="0" x2="28" y2="10" stroke="#C0C060" stroke-width="1.5"/>
  <line x1="272" y1="0" x2="272" y2="10" stroke="#C0C060" stroke-width="1.5"/>

  <!-- area bermain di bawah papan tulis -->
  <!-- label petunjuk di area panel -->
  <text x="150" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.18)">Area Peta Gaya</text>
</svg>
