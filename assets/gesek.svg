<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B6914"/><stop offset="100%" stop-color="#5C3E06"/></linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6B9ED6"/><stop offset="100%" stop-color="#2A6DB5"/></linearGradient>
    <filter id="gs"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <!-- permukaan kasar -->
  <rect x="20" y="148" width="220" height="26" rx="4" fill="url(#surface)" filter="url(#gs)"/>
  <!-- tonjolan permukaan kasar -->
  <g fill="#7A5A10" opacity="0.6">
    <path d="M30 148 L36 140 L42 148Z"/><path d="M52 148 L58 141 L64 148Z"/>
    <path d="M74 148 L80 140 L86 148Z"/><path d="M96 148 L102 141 L108 148Z"/>
    <path d="M118 148 L124 140 L130 148Z"/><path d="M140 148 L146 141 L152 148Z"/>
    <path d="M162 148 L168 140 L174 148Z"/><path d="M184 148 L190 141 L196 148Z"/>
    <path d="M206 148 L212 140 L218 148Z"/>
  </g>
  <!-- balok -->
  <rect x="80" y="108" width="80" height="40" rx="6" fill="url(#block)" filter="url(#gs)"/>
  <rect x="84" y="112" width="24" height="28" rx="3" fill="#A0C8F8" opacity="0.35"/>
  <text x="120" y="133" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">BALOK</text>
  <!-- panah gaya tarik (F) ke kanan -->
  <line x1="160" y1="128" x2="218" y2="128" stroke="#E85D24" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="218,122 232,128 218,134" fill="#E85D24"/>
  <text x="238" y="132" font-family="sans-serif" font-size="13" font-weight="700" fill="#E85D24">F</text>
  <!-- panah gaya gesek (fg) ke kiri -->
  <line x1="80" y1="144" x2="30" y2="144" stroke="#D4A017" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="30,138 16,144 30,150" fill="#D4A017"/>
  <text x="6" y="140" font-family="sans-serif" font-size="11" font-weight="700" fill="#D4A017">fg</text>
  <!-- panah gaya normal ke atas -->
  <line x1="120" y1="108" x2="120" y2="62" stroke="#34C88C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="114,62 120,48 126,62" fill="#34C88C"/>
  <text x="126" y="54" font-family="sans-serif" font-size="11" font-weight="700" fill="#34C88C">N</text>
  <!-- panah berat ke bawah -->
  <line x1="120" y1="148" x2="120" y2="182" stroke="#E85D24" stroke-width="3" stroke-linecap="round"/>
  <polygon points="114,182 120,196 126,182" fill="#E85D24"/>
  <text x="126" y="194" font-family="sans-serif" font-size="11" font-weight="700" fill="#E85D24">W</text>
  <!-- label -->
  <text x="130" y="220" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="700" fill="#2A6DB5">Gaya Gesek</text>
  <text x="130" y="235" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9AA8B8">Berlawanan arah dengan gerak benda</text>
</svg>
