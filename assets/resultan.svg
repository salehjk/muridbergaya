<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgRes" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0C1A"/><stop offset="100%" stop-color="#06080E"/></linearGradient>
    <filter id="glR"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shR"><feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgRes)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(56,217,245,.18)" stroke-width="3" rx="18"/>

  <!-- Judul -->
  <text x="400" y="48" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="32" font-weight="900" fill="#38D9F5" filter="url(#glR)">⚖️ RESULTAN GAYA (FR)</text>
  <text x="400" y="74" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(56,217,245,.65)">Jumlah vektor semua gaya yang bekerja pada suatu benda</text>

  <!-- Garis pembagi atas-bawah -->
  <line x1="20" y1="282" x2="780" y2="282" stroke="rgba(255,255,255,.08)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- ===== PANEL ATAS KIRI: GAYA SEARAH ===== -->
  <rect x="20" y="88" width="380" height="184" rx="14" fill="rgba(0,230,118,.07)" stroke="rgba(0,230,118,.25)" stroke-width="2"/>
  <text x="210" y="116" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="19" font-weight="900" fill="#00E676">➜ GAYA SEARAH: FR = F₁ + F₂</text>

  <!-- Balok tengah -->
  <rect x="166" y="150" width="90" height="52" rx="9" fill="rgba(56,217,245,.25)" stroke="#38D9F5" stroke-width="2"/>
  <text x="211" y="181" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" font-weight="800" fill="#fff">Benda</text>

  <!-- F1 ke kanan -->
  <line x1="256" y1="176" x2="310" y2="176" stroke="#FF6030" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="310,170 330,176 310,182" fill="#FF6030" filter="url(#glR)"/>
  <rect x="332" y="162" width="58" height="28" rx="7" fill="rgba(255,96,48,.18)" stroke="#FF6030" stroke-width="1.5"/>
  <text x="361" y="181" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FF6030">F₁=40N</text>

  <!-- F2 ke kanan juga -->
  <line x1="166" y1="200" x2="112" y2="200" stroke="#FFD020" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="166,194 166,206 150,200" fill="none"/>
  <line x1="90" y1="200" x2="144" y2="200" stroke="#FFD020" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="144,194 164,200 144,206" fill="#FFD020" filter="url(#glR)"/>
  <text x="90" y="188" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700" fill="#FFD020">F₂=30N</text>

  <!-- FR searah — panah lebih panjang hijau -->
  <rect x="44" y="222" width="336" height="38" rx="9" fill="rgba(0,230,118,.1)" stroke="rgba(0,230,118,.4)" stroke-width="1.5"/>
  <line x1="54" y1="241" x2="220" y2="241" stroke="#00E676" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="220,235 248,241 220,247" fill="#00E676" filter="url(#glR)"/>
  <text x="306" y="246" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#00E676">FR = 70 N →</text>

  <!-- ===== PANEL ATAS KANAN: GAYA BERLAWANAN ===== -->
  <rect x="412" y="88" width="368" height="184" rx="14" fill="rgba(255,61,138,.07)" stroke="rgba(255,61,138,.25)" stroke-width="2"/>
  <text x="596" y="116" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="19" font-weight="900" fill="#FF3D8A">↔ BERLAWANAN: FR = F₁ − F₂</text>

  <!-- Balok tengah -->
  <rect x="546" y="150" width="100" height="52" rx="9" fill="rgba(255,61,138,.2)" stroke="#FF3D8A" stroke-width="2"/>
  <text x="596" y="181" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" font-weight="800" fill="#fff">Benda</text>

  <!-- F1 besar ke kanan -->
  <line x1="646" y1="170" x2="714" y2="170" stroke="#FF6030" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="714,164 736,170 714,176" fill="#FF6030" filter="url(#glR)"/>
  <text x="694" y="158" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FF6030">F₁=50N</text>

  <!-- F2 ke kiri lebih kecil -->
  <line x1="546" y1="190" x2="478" y2="190" stroke="#FFD020" stroke-width="6" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="478,184 456,190 478,196" fill="#FFD020" filter="url(#glR)"/>
  <text x="498" y="178" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#FFD020">F₂=20N</text>

  <!-- FR berlawanan — panah ke kanan -->
  <rect x="430" y="222" width="330" height="38" rx="9" fill="rgba(0,230,118,.1)" stroke="rgba(0,230,118,.4)" stroke-width="1.5"/>
  <line x1="440" y1="241" x2="576" y2="241" stroke="#00E676" stroke-width="7" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="576,235 600,241 576,247" fill="#00E676" filter="url(#glR)"/>
  <text x="680" y="246" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="16" font-weight="700" fill="#00E676">FR = 30 N →</text>

  <!-- ===== BAWAH KIRI: Tarik Tambang ===== -->
  <rect x="20" y="294" width="380" height="176" rx="14" fill="rgba(168,85,247,.07)" stroke="rgba(168,85,247,.25)" stroke-width="2"/>
  <text x="210" y="320" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="17" font-weight="900" fill="#A855F7">🏆 CONTOH: TARIK TAMBANG</text>

  <!-- Tali tambang -->
  <line x1="60" y1="384" x2="350" y2="384" stroke="#D8B060" stroke-width="10" stroke-linecap="round"/>
  <!-- Orang kiri (tim merah) -->
  <circle cx="52" cy="358" r="16" fill="#F0C890"/>
  <line x1="52" y1="374" x2="52" y2="410" stroke="#D82020" stroke-width="10" stroke-linecap="round"/>
  <line x1="52" y1="384" x2="82" y2="384" stroke="#D82020" stroke-width="8" stroke-linecap="round"/>
  <line x1="52" y1="410" x2="36" y2="430" stroke="#D82020" stroke-width="8" stroke-linecap="round"/>
  <line x1="52" y1="410" x2="68" y2="430" stroke="#D82020" stroke-width="8" stroke-linecap="round"/>
  <!-- Orang kanan (tim biru) -->
  <circle cx="358" cy="358" r="16" fill="#F0C890"/>
  <line x1="358" y1="374" x2="358" y2="410" stroke="#1840D8" stroke-width="10" stroke-linecap="round"/>
  <line x1="358" y1="384" x2="328" y2="384" stroke="#1840D8" stroke-width="8" stroke-linecap="round"/>
  <line x1="358" y1="410" x2="342" y2="430" stroke="#1840D8" stroke-width="8" stroke-linecap="round"/>
  <line x1="358" y1="410" x2="374" y2="430" stroke="#1840D8" stroke-width="8" stroke-linecap="round"/>
  <!-- Bendera tengah -->
  <line x1="210" y1="360" x2="210" y2="410" stroke="#fff" stroke-width="3"/>
  <polygon points="210,360 230,370 210,380" fill="#FFD600"/>
  <!-- Panah gaya tim merah ke kiri -->
  <line x1="80" y1="368" x2="124" y2="368" stroke="#D82020" stroke-width="5" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="80,363 62,368 80,373" fill="#D82020"/>
  <text x="94" y="358" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="13" fill="#FF4040">400N←</text>
  <!-- Panah gaya tim biru ke kanan -->
  <line x1="286" y1="368" x2="330" y2="368" stroke="#1840D8" stroke-width="5" stroke-linecap="round" filter="url(#glR)"/>
  <polygon points="330,363 348,368 330,373" fill="#1840D8"/>
  <text x="316" y="358" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="13" fill="#4060FF">→450N</text>
  <!-- FR -->
  <rect x="44" y="436" width="336" height="26" rx="8" fill="rgba(184,255,60,.1)" stroke="rgba(184,255,60,.3)" stroke-width="1.5"/>
  <text x="212" y="454" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="700" fill="#B8FF3C">FR = 450−400 = 50N (→ Tim Biru menang)</text>

  <!-- ===== BAWAH KANAN: Rumus Ringkasan ===== -->
  <rect x="412" y="294" width="368" height="176" rx="14" fill="rgba(184,255,60,.06)" stroke="rgba(184,255,60,.22)" stroke-width="2"/>
  <text x="596" y="320" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="17" font-weight="900" fill="#B8FF3C">📐 RUMUS RINGKASAN</text>
  <line x1="430" y1="330" x2="770" y2="330" stroke="rgba(184,255,60,.2)" stroke-width="1.5"/>
  <!-- Rumus -->
  <g font-family="'Space Grotesk',sans-serif" font-size="18" font-weight="700">
    <text x="596" y="362" text-anchor="middle" fill="#fff">Searah: FR = F₁ + F₂ + ...</text>
    <text x="596" y="396" text-anchor="middle" fill="#fff">Berlawanan: FR = F₁ − F₂</text>
  </g>
  <line x1="430" y1="412" x2="770" y2="412" stroke="rgba(184,255,60,.15)" stroke-width="1.5"/>
  <text x="596" y="434" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(255,255,255,.65)">Satuan gaya: Newton (N)</text>
  <text x="596" y="456" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(255,255,255,.65)">1 N = Gaya untuk percepat 1 kg sebesar 1 m/s²</text>

  <!-- Rumus besar di paling bawah -->
  <rect x="20" y="482" width="760" height="100" rx="14" fill="rgba(56,217,245,.07)" stroke="rgba(56,217,245,.25)" stroke-width="2"/>
  <text x="400" y="516" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="20" font-weight="900" fill="#38D9F5">⚡ INGAT: Gaya adalah BESARAN VEKTOR (punya arah!)</text>
  <text x="400" y="544" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" fill="rgba(56,217,245,.75)">Dua gaya 50N searah → FR = 100N  |  Dua gaya 50N berlawanan → FR = 0N (setimbang)</text>
  <text x="400" y="568" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" fill="rgba(255,255,255,.45)">FR = 0N → Benda diam atau GLB (Hukum Newton I)</text>
</svg>
