<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <defs>
    <linearGradient id="magN" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D83030"/><stop offset="100%" stop-color="#A01818"/></linearGradient>
    <linearGradient id="magS" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2868D0"/><stop offset="100%" stop-color="#1040A0"/></linearGradient>
    <filter id="magSh"><feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- judul atas -->
  <text x="130" y="18" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="700" fill="#D0A8F8">Gaya Magnet</text>

  <!-- ===== KUTUB SEJENIS (menolak) ===== -->
  <text x="65" y="44" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF9090" font-weight="700">Kutub Sejenis → Menolak</text>
  <!-- magnet 1 kiri (N kanan) -->
  <rect x="14" y="52" width="42" height="28" rx="5" fill="url(#magS)" filter="url(#magSh)"/>
  <rect x="38" y="52" width="18" height="28" rx="0" fill="url(#magN)"/>
  <rect x="38" y="52" width="18" height="28" rx="5" style="border-radius:0 5px 5px 0" fill="url(#magN)"/>
  <text x="26" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">S</text>
  <text x="47" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">N</text>
  <!-- magnet 2 kanan (N kiri) -->
  <rect x="70" y="52" width="42" height="28" rx="5" fill="url(#magS)" filter="url(#magSh)"/>
  <rect x="70" y="52" width="18" height="28" rx="5" fill="url(#magN)"/>
  <text x="79" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">N</text>
  <text x="100" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">S</text>
  <!-- panah menolak -->
  <line x1="55" y1="66" x2="68" y2="66" stroke="#FF6060" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="56,61 42,66 56,71" fill="#FF6060"/>
  <polygon points="67,61 81,66 67,71" fill="#FF6060"/>
  <text x="61.5" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FF6060">↔ tolak</text>

  <!-- ===== KUTUB BERBEDA (menarik) ===== -->
  <text x="185" y="44" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#90D090" font-weight="700">Kutub Berbeda → Menarik</text>
  <!-- magnet 3 kiri (N kanan) -->
  <rect x="134" y="52" width="42" height="28" rx="5" fill="url(#magS)" filter="url(#magSh)"/>
  <rect x="158" y="52" width="18" height="28" rx="5" fill="url(#magN)" style="border-radius:0 5px 5px 0"/>
  <text x="146" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">S</text>
  <text x="167" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">N</text>
  <!-- magnet 4 kanan (S kiri) -->
  <rect x="190" y="52" width="42" height="28" rx="5" fill="url(#magS)" filter="url(#magSh)"/>
  <rect x="190" y="52" width="18" height="28" rx="5" fill="url(#magN)"/>
  <text x="199" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">N</text>
  <text x="220" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">S</text>
  <!-- panah menarik -->
  <line x1="175" y1="66" x2="188" y2="66" stroke="#60D060" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="176,61 190,66 176,71" fill="#60D060"/>
  <polygon points="187,61 173,66 187,71" fill="#60D060"/>
  <text x="181.5" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#60D060">↔ tarik</text>

  <!-- garis medan magnet -->
  <!-- medan menarik (lengkung) -->
  <path d="M167 80 C167 120 199 120 199 80" fill="none" stroke="#60D060" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.65"/>
  <path d="M162 80 C162 132 204 132 204 80" fill="none" stroke="#60D060" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.45"/>
  <path d="M158 80 C158 144 208 144 208 80" fill="none" stroke="#60D060" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- medan menolak -->
  <path d="M56 80 C36 108 76 108 56 80" fill="none" stroke="#FF9090" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.55"/>
  <path d="M66 80 C66 116 100 116 114 90" fill="none" stroke="#FF9090" stroke-width="1" stroke-dasharray="4 3" opacity="0.35"/>
  <path d="M46 80 C46 124 -4 124 -4 90" fill="none" stroke="#FF9090" stroke-width="1" stroke-dasharray="4 3" opacity="0.35"/>

  <!-- divider -->
  <line x1="128" y1="42" x2="128" y2="160" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- label sifat magnet -->
  <rect x="14" y="168" width="232" height="60" rx="10" fill="rgba(0,0,0,0.22)"/>
  <text x="130" y="186" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#FFD080">Sifat Gaya Magnet:</text>
  <g font-family="sans-serif" font-size="9" fill="#D8E8FF">
    <text x="22" y="200">✦ Kutub senama (N-N, S-S) → saling menolak</text>
    <text x="22" y="215">✦ Kutub berlawanan (N-S) → saling menarik</text>
    <text x="22" y="221" font-size="8" fill="#A0B8D0">✦ Gaya magnet termasuk GAYA TAK SENTUH</text>
  </g>
</svg>
