<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <!-- GAYA OTOT -->
  <defs>
    <linearGradient id="skG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5C890"/><stop offset="100%" stop-color="#C88040"/></linearGradient>
    <linearGradient id="boxG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#80C840"/><stop offset="100%" stop-color="#487818"/></linearGradient>
    <filter id="osSh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <!-- judul -->
  <text x="130" y="18" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="13" font-weight="700" fill="#F0C860">Gaya Otot</text>

  <!-- lantai -->
  <rect x="14" y="178" width="232" height="10" rx="3" fill="#5A4010" opacity="0.7"/>

  <!-- karton/kotak -->
  <rect x="148" y="138" width="72" height="40" rx="6" fill="url(#boxG)" filter="url(#osSh)"/>
  <rect x="152" y="142" width="20" height="32" rx="3" fill="#A0E858" opacity="0.3"/>
  <text x="184" y="164" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">KOTAK</text>

  <!-- orang mendorong -->
  <!-- kepala -->
  <circle cx="80" cy="120" r="14" fill="url(#skG)"/>
  <!-- telinga -->
  <ellipse cx="66" cy="120" rx="4" ry="6" fill="#D8A070"/>
  <ellipse cx="94" cy="120" rx="4" ry="6" fill="#D8A070"/>
  <!-- mata -->
  <circle cx="74" cy="117" r="2.5" fill="#3A2010"/>
  <circle cx="86" cy="117" r="2.5" fill="#3A2010"/>
  <!-- hidung & senyum -->
  <circle cx="80" cy="122" r="1.5" fill="#C08050"/>
  <path d="M74 127 Q80 132 86 127" fill="none" stroke="#C08050" stroke-width="1.5" stroke-linecap="round"/>
  <!-- badan -->
  <rect x="62" y="134" width="36" height="44" rx="8" fill="#4070C0"/>
  <rect x="68" y="138" width="10" height="32" rx="3" fill="#6090E0" opacity="0.35"/>
  <!-- lengan -->
  <line x1="98" y1="140" x2="146" y2="155" stroke="#4070C0" stroke-width="12" stroke-linecap="round"/>
  <line x1="98" y1="140" x2="146" y2="155" stroke="#6090E0" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- tangan kontak -->
  <ellipse cx="145" cy="156" rx="9" ry="7" fill="url(#skG)" transform="rotate(-15 145 156)"/>
  <!-- kaki -->
  <line x1="68" y1="178" x2="58" y2="196" stroke="#4070C0" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="178" x2="100" y2="196" stroke="#4070C0" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="56" cy="198" rx="10" ry="5" fill="#303030" transform="rotate(-15 56 198)"/>
  <ellipse cx="102" cy="198" rx="10" ry="5" fill="#303030" transform="rotate(10 102 198)"/>

  <!-- panah gaya otot -->
  <line x1="148" y1="152" x2="128" y2="152" stroke="#E85D24" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <text x="144" y="144" font-family="sans-serif" font-size="10" font-weight="700" fill="#E85D24">F</text>
  <!-- garis gerak kotak -->
  <line x1="220" y1="178" x2="244" y2="178" stroke="#90D080" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="244,174.5 252,178 244,181.5" fill="#90D080"/>

  <!-- keterangan -->
  <rect x="14" y="206" width="232" height="28" rx="8" fill="rgba(0,0,0,0.22)"/>
  <text x="130" y="219" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFD080">Gaya otot = gaya yang berasal dari kontraksi otot</text>
  <text x="130" y="230" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#D8E0FF" opacity="0.85">Termasuk GAYA SENTUH · Contoh: mendorong, menarik, mengangkat</text>
</svg>
