<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <defs>
    <radialGradient id="earthG" cx="50%" cy="40%" r="68%"><stop offset="0%" stop-color="#4CAF80"/><stop offset="55%" stop-color="#2E7D52"/><stop offset="100%" stop-color="#1B4C33"/></radialGradient>
    <radialGradient id="appleG" cx="35%" cy="28%" r="72%"><stop offset="0%" stop-color="#FF8070"/><stop offset="55%" stop-color="#E03018"/><stop offset="100%" stop-color="#981008"/></radialGradient>
    <radialGradient id="apple2" cx="35%" cy="28%" r="72%"><stop offset="0%" stop-color="#FF8070"/><stop offset="55%" stop-color="#E03018"/><stop offset="100%" stop-color="#981008"/></radialGradient>
    <filter id="gravSh"><feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <!-- bumi -->
  <ellipse cx="130" cy="218" rx="115" ry="30" fill="url(#earthG)" filter="url(#gravSh)"/>
  <ellipse cx="130" cy="208" rx="115" ry="24" fill="url(#earthG)"/>
  <text x="130" y="216" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#A8F0CA">BUMI</text>
  <!-- pohon batang -->
  <rect x="118" y="90" width="16" height="110" rx="5" fill="#7B4F1A"/>
  <!-- daun pohon -->
  <ellipse cx="126" cy="72" rx="38" ry="28" fill="#3A9B52"/>
  <ellipse cx="100" cy="82" rx="26" ry="20" fill="#45B060"/>
  <ellipse cx="152" cy="82" rx="26" ry="20" fill="#45B060"/>
  <ellipse cx="126" cy="54" rx="28" ry="22" fill="#4DC870"/>
  <!-- buah di pohon -->
  <circle cx="148" cy="76" r="12" fill="url(#appleG)"/>
  <path d="M148 64 L148 58 Q152 52 156 54" fill="none" stroke="#3A7020" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="143" cy="68" rx="4" ry="6" fill="#FF9090" opacity="0.35"/>
  <!-- buah jatuh -->
  <circle cx="180" cy="148" r="13" fill="url(#apple2)" filter="url(#gravSh)"/>
  <path d="M180 135 L180 128 Q184 122 188 124" fill="none" stroke="#3A7020" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="175" cy="140" rx="4" ry="6" fill="#FF9090" opacity="0.35"/>
  <!-- panah gaya gravitasi -->
  <line x1="180" y1="162" x2="180" y2="196" stroke="#E85D24" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="174,196 180,210 186,196" fill="#E85D24"/>
  <text x="192" y="178" font-family="sans-serif" font-size="13" font-weight="700" fill="#E85D24">g</text>
  <!-- garis putus-putus lintasan -->
  <line x1="180" y1="100" x2="180" y2="162" stroke="#E85D24" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.6"/>
  <!-- label Isaac Newton -->
  <rect x="22" y="116" width="78" height="42" rx="8" fill="rgba(0,0,0,0.25)"/>
  <text x="61" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFD080">Isaac Newton</text>
  <text x="61" y="148" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FFE0A0" opacity="0.85">menemukan gaya</text>
  <text x="61" y="159" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FFE0A0" opacity="0.85">gravitasi (1687)</text>
  <!-- label bawah -->
  <text x="130" y="18" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="700" fill="#4DC870">Gaya Gravitasi</text>
  <text x="130" y="34" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9AB8A4">g = 10 m/s²  •  W = m × g</text>
</svg>
