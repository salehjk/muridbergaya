<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="earthBig" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#3DCE72"/><stop offset="55%" stop-color="#1E7A3E"/><stop offset="100%" stop-color="#0D3D1C"/></radialGradient>
    <radialGradient id="apple1" cx="36%" cy="28%" r="70%"><stop offset="0%" stop-color="#FF9080"/><stop offset="55%" stop-color="#E52818"/><stop offset="100%" stop-color="#8A0808"/></radialGradient>
    <radialGradient id="apple2" cx="36%" cy="28%" r="70%"><stop offset="0%" stop-color="#FF9080"/><stop offset="55%" stop-color="#E52818"/><stop offset="100%" stop-color="#8A0808"/></radialGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5A2D08"/><stop offset="100%" stop-color="#8A5028"/></linearGradient>
    <linearGradient id="bgGV" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0C20"/><stop offset="100%" stop-color="#080614"/></linearGradient>
    <filter id="glowG"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shG"><feDropShadow dx="3" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGV)" rx="18"/>
  <rect width="800" height="600" fill="none" stroke="rgba(0,212,170,.2)" stroke-width="3" rx="18"/>

  <!-- Bintang kecil di latar -->
  <g fill="white" opacity="0.5">
    <circle cx="730" cy="50" r="2"/><circle cx="760" cy="90" r="1.5"/><circle cx="748" cy="130" r="2"/>
    <circle cx="780" cy="70" r="1"/><circle cx="716" cy="110" r="2.5"/>
  </g>

  <!-- Judul -->
  <text x="400" y="50" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="36" font-weight="900" fill="#00D4AA" filter="url(#glowG)">🌍 GAYA GRAVITASI</text>
  <text x="400" y="80" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" fill="rgba(0,212,170,.65)">Gaya tarik bumi terhadap semua benda bermassa</text>

  <!-- Bumi besar di bawah -->
  <ellipse cx="400" cy="570" rx="380" ry="80" fill="url(#earthBig)" filter="url(#shG)"/>
  <ellipse cx="400" cy="558" rx="380" ry="60" fill="url(#earthBig)"/>
  <!-- Kontur bumi -->
  <path d="M90 550 Q150 530 230 535 Q310 540 390 528 Q470 516 550 530 Q630 544 710 535" fill="none" stroke="#5AE878" stroke-width="2.5" opacity="0.5"/>
  <text x="400" y="575" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.85)">B U M I</text>

  <!-- Pohon -->
  <!-- Batang -->
  <rect x="172" y="340" width="26" height="188" rx="8" fill="url(#trunk)"/>
  <!-- Daun -->
  <ellipse cx="185" cy="290" rx="65" ry="56" fill="#2E8B3A"/>
  <ellipse cx="148" cy="316" rx="44" ry="36" fill="#3AA84A"/>
  <ellipse cx="222" cy="316" rx="44" ry="36" fill="#3AA84A"/>
  <ellipse cx="185" cy="252" rx="50" ry="44" fill="#4ACE5E"/>
  <!-- Buah di pohon -->
  <circle cx="222" cy="278" r="22" fill="url(#apple1)" filter="url(#shG)"/>
  <path d="M222 256 C222 250 226 243 232 242" fill="none" stroke="#2A5E10" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="215" cy="268" rx="7" ry="11" fill="rgba(255,180,160,.35)"/>

  <!-- Apel jatuh (posisi lebih bawah) -->
  <circle cx="360" cy="410" r="26" fill="url(#apple2)" filter="url(#shG)"/>
  <path d="M360 384 C360 376 365 368 372 366" fill="none" stroke="#2A5E10" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="352" cy="400" rx="8" ry="13" fill="rgba(255,180,160,.3)"/>

  <!-- Panah gravitasi — apel jatuh -->
  <line x1="360" y1="438" x2="360" y2="510" stroke="#FF6030" stroke-width="8" stroke-linecap="round" filter="url(#glowG)"/>
  <polygon points="350,510 360,534 370,510" fill="#FF6030" filter="url(#glowG)"/>
  <rect x="373" y="458" width="90" height="42" rx="10" fill="rgba(255,96,48,.18)" stroke="#FF6030" stroke-width="2"/>
  <text x="418" y="479" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700" fill="#FF6030">g = 10</text>
  <text x="418" y="496" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="#FF8050">m/s²</text>

  <!-- Garis lintasan putus -->
  <line x1="222" y1="300" x2="360" y2="400" stroke="#FF6030" stroke-width="2" stroke-dasharray="8 5" opacity="0.6"/>

  <!-- Panel rumus besar -->
  <rect x="460" y="120" width="300" height="330" rx="18" fill="rgba(0,212,170,.07)" stroke="rgba(0,212,170,.3)" stroke-width="2.5"/>
  <text x="610" y="162" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="18" font-weight="900" fill="#00D4AA">📐 RUMUS</text>
  <!-- W = mg -->
  <rect x="478" y="178" width="264" height="70" rx="12" fill="rgba(0,212,170,.12)" stroke="rgba(0,212,170,.4)" stroke-width="1.5"/>
  <text x="610" y="214" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="32" font-weight="700" fill="#B8FF3C">W = m × g</text>
  <text x="610" y="236" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(184,255,60,.7)">Berat = Massa × Percepatan Gravitasi</text>

  <!-- Contoh perhitungan -->
  <text x="610" y="282" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,.7)">Contoh:</text>
  <text x="610" y="308" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700" fill="#fff">m = 5 kg</text>
  <text x="610" y="334" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700" fill="#fff">g = 10 m/s²</text>
  <line x1="498" y1="348" x2="722" y2="348" stroke="rgba(0,212,170,.4)" stroke-width="1.5"/>
  <text x="610" y="374" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="24" font-weight="700" fill="#00D4AA">W = 5 × 10 = 50 N</text>

  <!-- Fakta: Massa vs Berat -->
  <rect x="478" y="392" width="264" height="48" rx="10" fill="rgba(255,214,0,.1)" stroke="rgba(255,214,0,.35)" stroke-width="1.5"/>
  <text x="610" y="414" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="14" font-weight="800" fill="#FFD600">⚠️ Massa (kg) ≠ Berat (N)</text>
  <text x="610" y="432" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="12" fill="rgba(255,214,0,.75)">Berat bergantung pada nilai g di lokasi</text>

  <!-- Newton credit -->
  <rect x="480" y="454" width="260" height="52" rx="10" fill="rgba(255,255,255,.04)"/>
  <text x="610" y="476" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(255,255,255,.55)">Isaac Newton (1687)</text>
  <text x="610" y="496" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="12" fill="rgba(255,255,255,.4)">Hukum Gravitasi Universal</text>

  <!-- Rumus besar di bawah -->
  <rect x="60" y="500" width="380" height="52" rx="14" fill="rgba(184,255,60,.08)" stroke="rgba(184,255,60,.3)" stroke-width="2"/>
  <text x="250" y="522" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="17" font-weight="700" fill="#B8FF3C">g ≈ 10 m/s²  di permukaan Bumi</text>
  <text x="250" y="542" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" fill="rgba(184,255,60,.65)">g Bulan = 1,6 m/s² (1/6 Bumi) 🌙</text>
</svg>
